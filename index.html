let activeSite  = 'all';
let activeGenre = '전체';
let searchQ     = '';

/* ── 초기화 ── */
function init() {
  // 사이트 탭 생성
  document.getElementById('siteTabs').innerHTML = SITES.map(s => `
    <button
      class="site-tab${s.id === 'all' ? ' active' : ''}"
      style="--site-color:${s.color}"
      onclick="filterSite('${s.id}', this)"
    >${s.label}</button>
  `).join('');

  // 장르 버튼 생성
  document.getElementById('genreBar').innerHTML = GENRES.map((g, i) =>
    `<button class="genre-btn${i === 0 ? ' active' : ''}" onclick="filterGenre('${g}', this)">${g}</button>`
  ).join('');

  render();
}

/* ── 필터 함수 ── */
function filterSite(siteId, btn) {
  activeSite = siteId;
  document.querySelectorAll('.site-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const s = SITES.find(x => x.id === siteId);
  document.getElementById('siteTitle').textContent = siteId === 'all' ? '전체 웹툰' : s.label + ' 웹툰';
  document.getElementById('siteSub').textContent   = s.desc;

  // 장르 필터 초기화
  activeGenre = '전체';
  document.querySelectorAll('.genre-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
  });

  render();
}

function filterGenre(genre, btn) {
  activeGenre = genre;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function onSearch() {
  searchQ = document.getElementById('searchInput').value.trim().toLowerCase();
  render();
}

/* ── 렌더 ── */
function render() {
  let list = webtoons;
  if (activeSite  !== 'all')  list = list.filter(w => w.site  === activeSite);
  if (activeGenre !== '전체') list = list.filter(w => w.genre === activeGenre);
  if (searchQ) list = list.filter(w =>
    w.title.toLowerCase().includes(searchQ) || w.author.includes(searchQ)
  );

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-result">해당하는 웹툰이 없습니다.</div>';
    return;
  }

  const siteColors = Object.fromEntries(SITES.map(s => [s.id, s.color]));

  grid.innerHTML = list.map((w, i) => `
    <div class="card" style="animation-delay:${i * 0.05}s"
         onclick="openDetail(${w.id})" tabindex="0" role="button" aria-label="${w.title} 상세보기">
      <div class="card-thumb" style="background-Image:url('${w.Image}')">
        <span class="card-site-badge" style="background:${siteColors[w.site]}">${SITES.find(s=>s.id===w.site).label}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${w.title}</div>
        <div class="card-author">${w.author}</div>
        <div class="card-meta">
          <span class="badge badge-${w.cls}">${w.genre}</span>
          <span class="rating">★ ${w.rating}</span>
        </div>
      </div>
    </div>
  `).join('');
}

/* ── 상세 패널 ── */
function openDetail(id) {
  const w       = webtoons.find(x => x.id === id);
  const ongoing = w.status === '연재중';
  const site    = SITES.find(s => s.id === w.site);

  document.getElementById('dThumb').style.backgroundImage = `url('${w.Image}')`;
  document.getElementById('dThumb').innerHTML = '';

  document.getElementById('dMetaRow').innerHTML =
    `<span class="detail-genre">${w.genre}</span>
     <span class="detail-site-badge" style="background:${site.color};color:#0f0f10">${site.label}</span>`;

  document.getElementById('dTitle').textContent  = w.title;
  document.getElementById('dAuthor').textContent = '작가: ' + w.author;

  document.getElementById('dStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">평점</div><div class="stat-value">★ ${w.rating}</div></div>
    <div class="stat-card"><div class="stat-label">에피소드</div><div class="stat-value">${w.episodes}화</div></div>
    <div class="stat-card"><div class="stat-label">조회수</div><div class="stat-value">${w.views}</div></div>
  `;

  document.getElementById('dDesc').textContent = w.desc;
  document.getElementById('dTags').innerHTML =
    `<span class="status-badge ${ongoing ? 'status-ongoing' : 'status-complete'}">
       <span class="dot ${ongoing ? 'dot-ongoing' : 'dot-complete'}"></span>${w.status}
     </span>` +
    w.tags.map(t => `<span class="tag">#${t}</span>`).join('');

  document.getElementById('dReadBtn').onclick = () =>
  window.open(w.link, '_blank');

  document.getElementById('overlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  document.body.style.overflow = '';
}


document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

init();
</script>
</body>
</html>
